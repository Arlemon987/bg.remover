<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI BG Remover (No API)</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.container {
    background: #1e293b;
    padding: 25px;
    border-radius: 15px;
    text-align: center;
    width: 360px;
}
button {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    background: #22c55e;
    color: white;
    cursor: pointer;
}
button:hover { background: #16a34a; }
img {
    max-width: 100%;
    margin-top: 15px;
    border-radius: 10px;
    background: repeating-conic-gradient(#ccc 0% 25%, #fff 0% 50%) 50% / 20px 20px;
}
#downloadBtn {
    display: none;
    margin-top: 10px;
    background: #3b82f6;
}
#status {
    font-size: 14px;
    margin-top: 10px;
    color: #94a3b8;
}
</style>
</head>

<body>

<div class="container">
    <h2>No API BG Remover</h2>

    <input type="file" id="input" accept="image/*"><br><br>
    <button onclick="process()">Remove Background</button>

    <div id="status"></div>

    <img id="output">
    <br>
    <button id="downloadBtn">Download PNG</button>
</div>

<script type="module">
import { pipeline } from "https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1";

let segmenter = null;

async function loadModel() {
    document.getElementById("status").innerText = "Loading AI model...";
    segmenter = await pipeline("image-segmentation", "Xenova/u2net");
    document.getElementById("status").innerText = "Model ready ✅";
}

loadModel();

window.process = async function () {
    const file = document.getElementById("input").files[0];
    if (!file) {
        alert("Upload an image first");
        return;
    }

    document.getElementById("status").innerText = "Processing...";

    const img = new Image();
    img.src = URL.createObjectURL(file);

    img.onload = async () => {
        const result = await segmenter(img);

        const mask = result[0].mask;

        const canvas = document.createElement("canvas");
        canvas.width = img.width;
        canvas.height = img.height;

        const ctx = canvas.getContext("2d");

        ctx.drawImage(img, 0, 0);

        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);

        for (let i = 0; i < mask.data.length; i++) {
            const alpha = mask.data[i] > 0.5 ? 255 : 0;
            imageData.data[i * 4 + 3] = alpha;
        }

        ctx.putImageData(imageData, 0, 0);

        const url = canvas.toDataURL("image/png");

        document.getElementById("output").src = url;

        const downloadBtn = document.getElementById("downloadBtn");
        downloadBtn.style.display = "inline-block";

        downloadBtn.onclick = () => {
            const a = document.createElement("a");
            a.href = url;
            a.download = "transparent.png";
            a.click();
        };

        document.getElementById("status").innerText = "Done ✅";
    };
};
</script>

</body>
</html>
